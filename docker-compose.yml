services:
  nginx:
    image: nginx:alpine
    ports:
      - "8903:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - marchseek

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    depends_on:
      - postgres
    networks:
      - marchseek

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    environment:
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
    networks:
      - marchseek

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work --sleep=3 --tries=3
    environment:
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
    networks:
      - marchseek

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan schedule:work
    environment:
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
    networks:
      - marchseek

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marchseek
      POSTGRES_USER: marchseek
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Do not publish the port to the host. Postgres is only accessible
    # from other containers on the "marchseek" Docker network using the
    # hostname "postgres" on port 5432.
    networks:
      - marchseek

volumes:
  pgdata:

networks:
  marchseek:
    driver: bridge
